name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  preflight:
    name: Validate release tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate Go module major path
        run: sh scripts/validate-go-module-tag.sh "${{ github.ref_name }}"

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore build caches
        uses: actions/cache@v5
        with:
          path: .cache
          key: ${{ runner.os }}-kview-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('Dockerfile', 'go.sum', 'ui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-kview-${{ matrix.goos }}-${{ matrix.goarch }}-
            ${{ runner.os }}-kview-

      - name: Build release binary in Docker
        run: make build-release GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} OUTPUT=dist/kview-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: kview-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/kview-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GH_REPO"; then
            gh release upload "$TAG_NAME" dist/* --clobber --repo "$GH_REPO"
          else
            gh release create "$TAG_NAME" dist/* --title "$TAG_NAME" --generate-notes --repo "$GH_REPO"
          fi
