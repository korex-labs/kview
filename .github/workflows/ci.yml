name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  check:
    name: Run project checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore build caches
        uses: actions/cache@v5
        with:
          path: .cache
          key: ${{ runner.os }}-kview-ci-${{ hashFiles('Dockerfile', 'go.sum', 'ui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-kview-ci-
            ${{ runner.os }}-kview-

      - name: Run checks in Docker
        run: make check

      - name: Run Go lint in Docker
        run: make lint-go

      - name: Generate coverage in Docker
        run: make coverage

      - name: Add coverage summary to job summary
        run: |
          echo "### Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat .artifacts/coverage/go-coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend coverage: skipped (no dedicated Vitest coverage config/script yet)." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: .artifacts/coverage
          if-no-files-found: error
