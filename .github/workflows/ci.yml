name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  check:
    name: Run project checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Restore build caches
        uses: actions/cache@v5
        with:
          path: .cache
          key: ${{ runner.os }}-kview-ci-${{ hashFiles('Dockerfile', 'go.sum', 'ui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-kview-ci-
            ${{ runner.os }}-kview-

      - name: Run checks in Docker
        run: make check

      - name: Run Go lint in Docker
        run: make lint-go
