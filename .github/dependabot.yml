version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    ignore:
      # Major Go dependency upgrades require explicit review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      kubernetes:
        patterns:
          - "k8s.io/*"
          - "k8s.io/klog/v2"                    # versioned major-suffix path
          - "sigs.k8s.io/*"
          - "sigs.k8s.io/kustomize/*"            # two-component path
          - "sigs.k8s.io/structured-merge-diff/v6" # two-component path
      helm:
        patterns:
          - "helm.sh/helm/v3"                    # full module path required; /* would not match

  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    ignore:
      # Major npm upgrades (Vite, MUI, React) require explicit review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      frontend-tooling:
        dependency-type: "development"
        patterns:
          - "vite"
          - "vitest"
          - "eslint*"
          - "@eslint/*"     # scoped package: @eslint/js — @eslint* would not match the slash
          - "typescript*"   # covers typescript and typescript-eslint
          - "@types/*"
      frontend-runtime:
        dependency-type: "production"
        patterns:
          - "react"
          - "react-dom"
          - "@mui/*"
          - "@emotion/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
