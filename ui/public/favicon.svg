<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="32" height="32" rx="7" fill="#0F4C81"></rect>

  <!-- Outer helm (kube-like, symmetric) -->
  <circle cx="16" cy="16" r="11" stroke="white" stroke-width="2"></circle>

  <!-- 6 symmetric spokes (kubernetes vibe) -->
  <g stroke="white" stroke-width="2" stroke-linecap="round">
    <line x1="16" y1="3" x2="16" y2="7"></line>
    <line x1="16" y1="25" x2="16" y2="29"></line>

    <line x1="3" y1="16" x2="7" y2="16"></line>
    <line x1="25" y1="16" x2="29" y2="16"></line>

    <line x1="6" y1="6" x2="8.5" y2="8.5"></line>
    <line x1="23.5" y1="23.5" x2="26" y2="26"></line>

    <line x1="6" y1="26" x2="8.5" y2="23.5"></line>
    <line x1="23.5" y1="8.5" x2="26" y2="6"></line>
  </g>

  <!-- Pyramid (clean, no bricks) -->
  <path d="M16 9 L23 21 L9 21 Z" stroke="white" stroke-width="2" fill="none"></path>

  <!-- Eye (slightly wider than pyramid) -->
  <ellipse cx="16" cy="16" rx="6" ry="3.2" stroke="white" stroke-width="2"></ellipse>
  <circle cx="16" cy="16" r="1.4" fill="white"></circle>
</svg>
